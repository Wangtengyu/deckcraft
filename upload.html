<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模板投喂 - 秒演</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0f',
                        surface: '#12121a',
                        card: '#1a1a24',
                        border: '#2a2a3a',
                        accent: '#00d4ff',
                        accent2: '#ff6b9d',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #00d4ff 0%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #00a8cc 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.35);
        }
        
        .btn-secondary {
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        
        .upload-zone {
            border: 2px dashed #2a2a3a;
            transition: all 0.3s ease;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }
        
        .feature-card {
            background: linear-gradient(145deg, #1a1a24 0%, #12121a 100%);
        }
        
        input, textarea, select {
            background: #1a1a24 !important;
            border: 1px solid #2a2a3a !important;
            color: white !important;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #00d4ff !important;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1) !important;
            outline: none !important;
        }

        /* Toast通知样式 */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-info { background: #3b82f6; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-dark/90 backdrop-blur-md border-b border-white/5">
        <div class="max-w-6xl mx-auto px-4 md:px-6 py-4 flex justify-between items-center">
            <!-- Logo -->
            <a href="index.html" class="flex items-center space-x-3 group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent via-purple-500 to-accent2 flex items-center justify-center shadow-lg shadow-accent/20 group-hover:shadow-accent/40 transition-all duration-300">
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-bold bg-gradient-to-r from-accent via-purple-400 to-accent2 bg-clip-text text-transparent">FDeck</span>
                    <span class="text-[10px] text-gray-400 -mt-0.5 tracking-widest">秒演</span>
                </div>
            </a>
            
            <!-- 导航链接 -->
            <div class="flex items-center space-x-6">
                <a href="index.html" class="text-gray-400 hover:text-white transition text-sm font-medium">首页</a>
                <a href="upload.html" class="text-white text-sm font-medium">模板投喂</a>
                
                <!-- 登录状态 -->
                <div id="userStatus" class="flex items-center space-x-3">
                    <!-- 未登录状态 -->
                    <button id="loginBtn" onclick="showLoginModal()" class="hidden px-4 py-2 rounded-lg btn-primary text-sm">
                        <i class="fas fa-user mr-2"></i>登录
                    </button>
                    <!-- 已登录状态 -->
                    <div id="userInfo" class="hidden flex items-center space-x-2">
                        <img id="userAvatar" class="w-8 h-8 rounded-full border border-border">
                        <span id="userName" class="text-sm text-gray-300"></span>
                        <button onclick="logout()" class="text-gray-500 hover:text-gray-300 ml-2" title="退出登录">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-[#12121a] rounded-2xl p-8 max-w-sm w-full border border-[#2a2a3a] relative">
            <button onclick="closeLoginModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white">
                <i class="fas fa-times"></i>
            </button>
            <h3 class="text-xl font-bold text-center mb-6">登录账号</h3>
            
            <!-- 微信扫码登录 -->
            <div class="text-center">
                <div id="wxQrCode" class="w-48 h-48 mx-auto bg-white rounded-xl mb-4 flex items-center justify-center">
                    <div class="text-center">
                        <i class="fas fa-qrcode text-6xl text-gray-300 mb-2"></i>
                        <p class="text-xs text-gray-500">加载中...</p>
                    </div>
                </div>
                <p class="text-gray-400 text-sm">微信扫码登录</p>
                <p class="text-gray-500 text-xs mt-2">登录后可上传模板、查看审核进度</p>
            </div>
            
            <!-- 游客模式 -->
            <div class="mt-6 pt-6 border-t border-[#2a2a3a]">
                <button onclick="guestLogin()" class="w-full btn-secondary py-3 rounded-xl">
                    <i class="fas fa-user-secret mr-2"></i>游客模式（临时体验）
                </button>
            </div>
            
            <button onclick="closeLoginModal()" class="mt-4 w-full text-gray-500 text-sm hover:text-gray-300">取消</button>
        </div>
    </div>

    <!-- 主内容 -->
    <main class="pt-24 pb-12 px-4 md:px-6">
        <div class="max-w-4xl mx-auto">
            <!-- 标题 -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold mb-2">模板投喂</h1>
                <p class="text-gray-400">上传PPT模板，图片自动入库复用</p>
            </div>
            
            <!-- 上传区域 -->
            <div class="feature-card rounded-2xl border border-border p-8 mb-8">
                <div 
                    id="uploadZone" 
                    class="upload-zone rounded-xl p-12 text-center cursor-pointer"
                    onclick="document.getElementById('fileInput').click()"
                >
                    <input type="file" id="fileInput" accept=".pptx" class="hidden" onchange="handleFileSelect(event)">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-accent/10 flex items-center justify-center">
                        <i class="fas fa-cloud-upload-alt text-3xl text-accent"></i>
                    </div>
                    <p class="text-lg font-medium mb-2">拖拽上传或点击选择</p>
                    <p class="text-gray-500 text-sm">支持格式：.pptx</p>
                    <p class="text-gray-600 text-xs mt-2">最大支持50MB文件</p>
                </div>
            </div>
            
            <!-- 解析结果预览 -->
            <div id="parseResult" class="hidden feature-card rounded-2xl border border-border p-6 mb-8">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold">解析结果</h3>
                    <span id="uploadStatus" class="text-xs px-3 py-1 rounded-full bg-yellow-500/20 text-yellow-400">
                        <i class="fas fa-clock mr-1"></i>待提交
                    </span>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <!-- 模板名称 -->
                    <div>
                        <label class="block text-sm font-medium mb-2">模板名称 <span class="text-red-400">*</span></label>
                        <input type="text" id="templateName" class="w-full rounded-xl px-4 py-3" placeholder="例如：党政红金模板">
                    </div>
                    
                    <!-- 分类选择 -->
                    <div>
                        <label class="block text-sm font-medium mb-2">分类</label>
                        <select id="templateCategory" class="w-full rounded-xl px-4 py-3">
                            <option value="party">党政</option>
                            <option value="business">商务</option>
                            <option value="tech">科技</option>
                            <option value="education">教育</option>
                            <option value="life">生活</option>
                        </select>
                    </div>
                </div>
                
                <!-- 解析信息 -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">风格识别</p>
                        <p id="styleType" class="text-accent font-medium">-</p>
                    </div>
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">提取图片</p>
                        <p id="imageCount" class="text-accent font-medium">0 张</p>
                    </div>
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">页面数量</p>
                        <p id="pageCount" class="text-accent font-medium">0 页</p>
                    </div>
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">文件大小</p>
                        <p id="fileSize" class="text-accent font-medium">-</p>
                    </div>
                </div>
                
                <!-- 提取的图片预览 -->
                <div id="imagePreview" class="mb-6">
                    <p class="text-sm font-medium mb-2">提取的图片预览</p>
                    <div id="imageGrid" class="grid grid-cols-4 md:grid-cols-6 gap-2">
                        <!-- 图片缩略图将动态插入 -->
                    </div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="flex space-x-3">
                    <button id="submitBtn" onclick="submitTemplate(event)" class="flex-1 btn-primary text-white py-3 rounded-xl font-medium">
                        <i class="fas fa-check mr-2"></i>
                        确认入库
                    </button>
                    <button onclick="cancelUpload()" class="btn-secondary text-white py-3 px-6 rounded-xl font-medium">
                        取消
                    </button>
                </div>
            </div>
            
            <!-- 已投喂模板列表 -->
            <div class="feature-card rounded-2xl border border-border p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold">已投喂模板</h3>
                    <span class="text-gray-500 text-sm">共 <span id="totalTemplates">0</span> 个</span>
                </div>
                
                <!-- 空状态 -->
                <div id="emptyState" class="text-center py-12">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-surface flex items-center justify-center">
                        <i class="fas fa-inbox text-3xl text-gray-600"></i>
                    </div>
                    <p class="text-gray-500 mb-2">暂无投喂记录</p>
                    <p class="text-gray-600 text-sm">上传PPT模板开始投喂吧</p>
                </div>
                
                <div id="templateListContainer" class="hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="text-left text-gray-500 text-sm border-b border-border">
                                    <th class="pb-3">模板</th>
                                    <th class="pb-3">分类</th>
                                    <th class="pb-3">图片数</th>
                                    <th class="pb-3">状态</th>
                                    <th class="pb-3">操作</th>
                                </tr>
                            </thead>
                            <tbody id="templateList">
                                <!-- 模板列表将动态插入 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast通知容器 -->
    <div id="toastContainer"></div>

    <script>
        // 后端API地址
        const API_BASE = 'https://ig8u65l6vm.sealosbja.site'
        
        // 全局状态
        let currentFile = null
        let currentUser = null

        // 初始化：检查登录状态
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus()
            loadTemplateList()
        })

        /**
         * 检查登录状态
         */
        function checkLoginStatus() {
            const token = localStorage.getItem('auth_token')
            const userName = localStorage.getItem('user_name')
            const userAvatar = localStorage.getItem('user_avatar')
            const userId = localStorage.getItem('user_id')
            
            if (token && userName) {
                // 已登录
                currentUser = { id: userId, name: userName, avatar: userAvatar }
                document.getElementById('loginBtn').classList.add('hidden')
                document.getElementById('userInfo').classList.remove('hidden')
                document.getElementById('userName').textContent = userName
                document.getElementById('userAvatar').src = userAvatar || 'https://via.placeholder.com/32'
            } else {
                // 未登录
                currentUser = null
                document.getElementById('loginBtn').classList.remove('hidden')
                document.getElementById('userInfo').classList.add('hidden')
            }
        }

        /**
         * 显示登录弹窗
         */
        function showLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden')
            // 模拟加载微信二维码
            loadWxQrCode()
        }

        /**
         * 关闭登录弹窗
         */
        function closeLoginModal() {
            document.getElementById('loginModal').classList.add('hidden')
        }

        /**
         * 加载微信二维码（模拟）
         */
        function loadWxQrCode() {
            const qrContainer = document.getElementById('wxQrCode')
            qrContainer.innerHTML = `
                <div class="text-center">
                    <div class="w-32 h-32 bg-gradient-to-br from-green-500/20 to-green-600/20 rounded-lg flex items-center justify-center mb-2">
                        <i class="fas fa-mobile-alt text-4xl text-green-500"></i>
                    </div>
                    <p class="text-xs text-gray-500">等待扫码...</p>
                    <p class="text-xs text-gray-400 mt-1">功能开发中</p>
                </div>
            `
        }

        /**
         * 游客登录
         */
        function guestLogin() {
            const guestId = 'guest_' + Date.now()
            const guestName = '游客_' + Math.random().toString(36).substr(2, 4)
            
            localStorage.setItem('auth_token', guestId)
            localStorage.setItem('user_id', guestId)
            localStorage.setItem('user_name', guestName)
            localStorage.setItem('user_avatar', '')
            
            closeLoginModal()
            checkLoginStatus()
            showToast('已以游客身份登录', 'success')
        }

        /**
         * 退出登录
         */
        function logout() {
            if (!confirm('确定要退出登录吗？')) return
            
            localStorage.removeItem('auth_token')
            localStorage.removeItem('user_id')
            localStorage.removeItem('user_name')
            localStorage.removeItem('user_avatar')
            
            currentUser = null
            checkLoginStatus()
            showToast('已退出登录', 'info')
        }

        /**
         * Toast通知
         */
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer')
            const toast = document.createElement('div')
            toast.className = `toast toast-${type}`
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'} mr-2"></i>${message}`
            container.appendChild(toast)
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease'
                setTimeout(() => toast.remove(), 300)
            }, 3000)
        }

        // 拖拽上传
        const uploadZone = document.getElementById('uploadZone')
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault()
            uploadZone.classList.add('dragover')
        })
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover')
        })
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault()
            uploadZone.classList.remove('dragover')
            const files = e.dataTransfer.files
            if (files.length > 0 && files[0].name.endsWith('.pptx')) {
                processFile(files[0])
            } else {
                showToast('请上传.pptx格式的文件', 'error')
            }
        })
        
        function handleFileSelect(event) {
            const file = event.target.files[0]
            if (file) {
                // 检查文件大小
                if (file.size > 50 * 1024 * 1024) {
                    showToast('文件大小不能超过50MB', 'error')
                    return
                }
                processFile(file)
            }
        }

        /**
         * 处理上传的文件
         */
        let currentFileData = null  // 保存当前文件数据

        async function processFile(file) {
            console.log('处理文件:', file.name)
            currentFile = file
            currentFileData = null
            
            // 显示loading
            document.getElementById('parseResult').classList.remove('hidden')
            document.getElementById('uploadStatus').innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>解析中...'
            document.getElementById('uploadStatus').className = 'text-xs px-3 py-1 rounded-full bg-blue-500/20 text-blue-400'
            
            document.getElementById('parseResult').innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold">解析结果</h3>
                    <span id="uploadStatus" class="text-xs px-3 py-1 rounded-full bg-blue-500/20 text-blue-400">
                        <i class="fas fa-spinner fa-spin mr-1"></i>解析中...
                    </span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">模板名称 <span class="text-red-400">*</span></label>
                        <input type="text" id="templateName" class="w-full rounded-xl px-4 py-3" placeholder="例如：党政红金模板">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">分类</label>
                        <select id="templateCategory" class="w-full rounded-xl px-4 py-3">
                            <option value="party">党政</option>
                            <option value="business">商务</option>
                            <option value="tech">科技</option>
                            <option value="education">教育</option>
                            <option value="life">生活</option>
                        </select>
                    </div>
                </div>
                <div class="text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-accent border-t-transparent mb-3"></div>
                    <p class="text-gray-400">正在解析PPT模板...</p>
                    <p class="text-gray-500 text-sm mt-1">提取图片、配色、布局信息</p>
                </div>
            `
            
            try {
                // 读取文件为base64
                const fileBase64 = await fileToBase64(file)
                currentFileData = fileBase64
                
                // 调用后端API解析模板
                const response = await fetch(`${API_BASE}/parse-template`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('auth_token') || ''}`
                    },
                    body: JSON.stringify({
                        file: fileBase64,
                        fileName: file.name
                    })
                })
                
                const result = await response.json()
                
                if (result.success) {
                    displayParseResult(result.data, file)
                } else {
                    throw new Error(result.message || '解析失败')
                }
            } catch (error) {
                console.error('解析失败:', error)
                showToast(`解析失败: ${error.message}，使用本地解析`, 'warning')
                // 降级为模拟解析
                displayMockResult(file)
            }
        }

        /**
         * 显示解析结果
         */
        function displayParseResult(data, file) {
            const parseResult = document.getElementById('parseResult')
            if (!parseResult) return
            
            parseResult.innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold">解析结果</h3>
                    <span id="uploadStatus" class="text-xs px-3 py-1 rounded-full bg-yellow-500/20 text-yellow-400">
                        <i class="fas fa-clock mr-1"></i>待提交
                    </span>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">模板名称 <span class="text-red-400">*</span></label>
                        <input type="text" id="templateName" class="w-full rounded-xl px-4 py-3" value="${file.name.replace('.pptx', '')}" placeholder="例如：党政红金模板">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">分类</label>
                        <select id="templateCategory" class="w-full rounded-xl px-4 py-3">
                            <option value="party" ${data.styleType?.includes('党政') ? 'selected' : ''}>党政</option>
                            <option value="business" ${data.styleType?.includes('商务') ? 'selected' : ''}>商务</option>
                            <option value="tech" ${data.styleType?.includes('科技') ? 'selected' : ''}>科技</option>
                            <option value="education" ${data.styleType?.includes('教育') ? 'selected' : ''}>教育</option>
                            <option value="life" ${data.styleType?.includes('生活') ? 'selected' : ''}>生活</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">风格识别</p>
                        <p id="styleType" class="text-accent font-medium">${data.styleType || '-'}</p>
                    </div>
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">提取图片</p>
                        <p id="imageCount" class="text-accent font-medium">${data.imageCount || 0} 张</p>
                    </div>
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">页面数量</p>
                        <p id="pageCount" class="text-accent font-medium">${data.pageCount || 0} 页</p>
                    </div>
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">文件大小</p>
                        <p id="fileSize" class="text-accent font-medium">${(file.size / 1024 / 1024).toFixed(2)} MB</p>
                    </div>
                </div>
                
                <div id="imagePreview" class="mb-6">
                    <p class="text-sm font-medium mb-2">提取的图片预览</p>
                    <div id="imageGrid" class="grid grid-cols-4 md:grid-cols-6 gap-2">
                        ${generateImagePlaceholders(data.imageCount || 8)}
                    </div>
                </div>
                
                <div class="flex space-x-3">
                    <button id="submitBtn" onclick="submitTemplate(event)" class="flex-1 btn-primary text-white py-3 rounded-xl font-medium">
                        <i class="fas fa-check mr-2"></i>
                        确认入库
                    </button>
                    <button onclick="cancelUpload()" class="btn-secondary text-white py-3 px-6 rounded-xl font-medium">
                        取消
                    </button>
                </div>
            `
            
            // 保存解析数据
            currentFileData = {
                ...data,
                fileName: file.name,
                fileSize: file.size
            }
        }

        /**
         * 模拟解析结果（当API不可用时）
         */
        function displayMockResult(file) {
            const styleTypes = ['党政红金', '商务蓝白', '科技未来', '教育培训', '清新生活']
            const randomStyle = styleTypes[Math.floor(Math.random() * styleTypes.length)]
            const imageCount = Math.floor(Math.random() * 15) + 5
            const pageCount = Math.floor(Math.random() * 15) + 5
            
            const parseResult = document.getElementById('parseResult')
            if (!parseResult) return
            
            parseResult.innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold">解析结果</h3>
                    <span id="uploadStatus" class="text-xs px-3 py-1 rounded-full bg-yellow-500/20 text-yellow-400">
                        <i class="fas fa-clock mr-1"></i>待提交
                    </span>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">模板名称 <span class="text-red-400">*</span></label>
                        <input type="text" id="templateName" class="w-full rounded-xl px-4 py-3" value="${file.name.replace('.pptx', '')}" placeholder="例如：党政红金模板">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">分类</label>
                        <select id="templateCategory" class="w-full rounded-xl px-4 py-3">
                            <option value="party" ${randomStyle.includes('党政') ? 'selected' : ''}>党政</option>
                            <option value="business" ${randomStyle.includes('商务') ? 'selected' : ''}>商务</option>
                            <option value="tech" ${randomStyle.includes('科技') ? 'selected' : ''}>科技</option>
                            <option value="education" ${randomStyle.includes('教育') ? 'selected' : ''}>教育</option>
                            <option value="life" ${randomStyle.includes('生活') ? 'selected' : ''}>生活</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">风格识别</p>
                        <p id="styleType" class="text-accent font-medium">${randomStyle}</p>
                    </div>
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">提取图片</p>
                        <p id="imageCount" class="text-accent font-medium">${imageCount} 张</p>
                    </div>
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">页面数量</p>
                        <p id="pageCount" class="text-accent font-medium">${pageCount} 页</p>
                    </div>
                    <div class="bg-surface rounded-xl p-4">
                        <p class="text-gray-500 text-xs mb-1">文件大小</p>
                        <p id="fileSize" class="text-accent font-medium">${(file.size / 1024 / 1024).toFixed(2)} MB</p>
                    </div>
                </div>
                
                <div id="imagePreview" class="mb-6">
                    <p class="text-sm font-medium mb-2">提取的图片预览</p>
                    <div id="imageGrid" class="grid grid-cols-4 md:grid-cols-6 gap-2">
                        ${generateImagePlaceholders(imageCount)}
                    </div>
                </div>
                
                <div class="flex space-x-3">
                    <button id="submitBtn" onclick="submitTemplate(event)" class="flex-1 btn-primary text-white py-3 rounded-xl font-medium">
                        <i class="fas fa-check mr-2"></i>
                        确认入库
                    </button>
                    <button onclick="cancelUpload()" class="btn-secondary text-white py-3 px-6 rounded-xl font-medium">
                        取消
                    </button>
                </div>
            `
            
            // 保存模拟数据
            currentFileData = {
                styleType: randomStyle,
                imageCount: imageCount,
                pageCount: pageCount,
                fileName: file.name,
                fileSize: file.size
            }
        }

        /**
         * 生成图片占位符
         */
        function generateImagePlaceholders(count) {
            const colors = [
                'from-red-900/50 to-amber-900/50',
                'from-blue-900/50 to-cyan-900/50',
                'from-purple-900/50 to-pink-900/50',
                'from-green-900/50 to-emerald-900/50',
                'from-yellow-900/50 to-orange-900/50'
            ]
            
            let html = ''
            for (let i = 0; i < Math.min(count, 12); i++) {
                const colorClass = colors[i % colors.length]
                html += `
                    <div class="aspect-video bg-surface rounded-lg overflow-hidden">
                        <div class="w-full h-full bg-gradient-to-br ${colorClass} flex items-center justify-center">
                            <i class="fas fa-image text-white/30"></i>
                        </div>
                    </div>
                `
            }
            return html
        }

        /**
         * 提交模板
         */
        async function submitTemplate(event) {
            const btn = event.target
            const name = document.getElementById('templateName')?.value
            const category = document.getElementById('templateCategory')?.value
            
            if (!name) {
                showToast('请输入模板名称', 'error')
                return
            }
            
            if (!currentFile && !currentFileData) {
                showToast('请先上传文件', 'error')
                return
            }
            
            // 显示提交中
            btn.disabled = true
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>提交中...'
            
            try {
                // 确保有文件数据
                if (!currentFileData || typeof currentFileData === 'string') {
                    // 需要重新读取文件
                    if (currentFile) {
                        currentFileData = await fileToBase64(currentFile)
                    } else {
                        throw new Error('缺少文件数据')
                    }
                }
                
                const token = localStorage.getItem('auth_token')
                const userId = localStorage.getItem('user_id')
                
                const response = await fetch(`${API_BASE}/template-upload`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token || ''}`
                    },
                    body: JSON.stringify({
                        file: currentFileData,
                        name: name,
                        category: category || 'party',
                        userId: userId || 'anonymous'
                    })
                })
                
                const result = await response.json()
                
                if (result.success) {
                    showToast('模板投喂成功！等待审核。', 'success')
                    cancelUpload()
                    loadTemplateList() // 刷新列表
                } else {
                    throw new Error(result.message || '上传失败')
                }
            } catch (error) {
                console.error('上传失败:', error)
                // 显示真实错误，而不是假装成功
                showToast(`上传失败: ${error.message}`, 'error')
                // 如果用户想继续，可以选择离线模式
                if (confirm('API调用失败，是否保存到本地缓存？\n\n错误信息: ' + error.message)) {
                    // 保存到本地模拟成功
                    const mockTemplate = {
                        id: 'local_' + Date.now(),
                        name: name,
                        category: category || 'party',
                        use_count: 0,
                        status: 'local',
                        created_at: new Date()
                    }
                    let localTemplates = JSON.parse(localStorage.getItem('local_templates') || '[]')
                    localTemplates.push(mockTemplate)
                    localStorage.setItem('local_templates', JSON.stringify(localTemplates))
                    
                    showToast('已保存到本地缓存', 'success')
                    cancelUpload()
                    loadTemplateList()
                }
            } finally {
                btn.disabled = false
                btn.innerHTML = '<i class="fas fa-check mr-2"></i>确认入库'
            }
        }

        /**
         * 取消上传
         */
        function cancelUpload() {
            const parseResult = document.getElementById('parseResult')
            if (parseResult) {
                parseResult.classList.add('hidden')
            }
            document.getElementById('fileInput').value = ''
            currentFile = null
            currentFileData = null
        }

        /**
         * 加载模板列表
         */
        async function loadTemplateList() {
            const token = localStorage.getItem('auth_token')
            const userId = localStorage.getItem('user_id')
            
            try {
                const response = await fetch(`${API_BASE}/template-list?userId=${userId || 'anonymous'}`, {
                    headers: {
                        'Authorization': `Bearer ${token || ''}`
                    }
                })
                
                if (response.ok) {
                    const result = await response.json()
                    if (result.success && result.data) {
                        renderTemplateList(result.data)
                    } else {
                        renderEmptyList()
                    }
                } else {
                    renderEmptyList()
                }
            } catch (error) {
                console.error('加载模板列表失败:', error)
                renderEmptyList()
            }
        }

        /**
         * 渲染模板列表
         */
        function renderTemplateList(templates) {
            const totalEl = document.getElementById('totalTemplates')
            const emptyEl = document.getElementById('emptyState')
            const containerEl = document.getElementById('templateListContainer')
            const listEl = document.getElementById('templateList')
            
            if (!templates || templates.length === 0) {
                renderEmptyList()
                return
            }
            
            totalEl.textContent = templates.length
            emptyEl.classList.add('hidden')
            containerEl.classList.remove('hidden')
            
            const categoryMap = {
                party: '党政',
                business: '商务',
                tech: '科技',
                education: '教育',
                life: '生活'
            }
            
            const statusMap = {
                pending: ['待审核', 'bg-yellow-500/20 text-yellow-400'],
                approved: ['已通过', 'bg-green-500/20 text-green-400'],
                rejected: ['已拒绝', 'bg-red-500/20 text-red-400']
            }
            
            listEl.innerHTML = templates.map(t => {
                const [statusText, statusClass] = statusMap[t.status] || statusMap.pending
                return `
                    <tr class="border-b border-border/50 hover:bg-white/5">
                        <td class="py-4">
                            <div class="flex items-center space-x-3">
                                <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-accent/20 to-accent2/20 flex items-center justify-center">
                                    <i class="fas fa-file-powerpoint text-accent"></i>
                                </div>
                                <div>
                                    <p class="font-medium">${t.name}</p>
                                    <p class="text-xs text-gray-500">${t.config?.styleType || '通用风格'}</p>
                                </div>
                            </div>
                        </td>
                        <td class="py-4 text-gray-400">${categoryMap[t.category] || t.category}</td>
                        <td class="py-4 text-accent">${t.config?.imageCount || 0}</td>
                        <td class="py-4">
                            <span class="text-xs px-2 py-1 rounded-full ${statusClass}">${statusText}</span>
                        </td>
                        <td class="py-4">
                            <button class="text-red-400 hover:text-red-300 text-sm" onclick="deleteTemplate('${t._id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `
            }).join('')
        }

        /**
         * 渲染空列表
         */
        function renderEmptyList() {
            const totalEl = document.getElementById('totalTemplates')
            const emptyEl = document.getElementById('emptyState')
            const containerEl = document.getElementById('templateListContainer')
            
            totalEl.textContent = '0'
            emptyEl.classList.remove('hidden')
            containerEl.classList.add('hidden')
        }

        /**
         * 删除模板
         */
        async function deleteTemplate(id) {
            if (!confirm('确定要删除这个模板吗？')) return
            
            try {
                const token = localStorage.getItem('auth_token')
                await fetch(`${API_BASE}/template-delete?id=${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token || ''}`
                    }
                })
                showToast('模板已删除', 'success')
                loadTemplateList()
            } catch (error) {
                console.error('删除失败:', error)
                showToast('删除失败', 'error')
            }
        }

        /**
         * 文件转Base64
         */
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader()
                reader.onload = () => resolve(reader.result)
                reader.onerror = reject
                reader.readAsDataURL(file)
            })
        }

        // 点击弹窗外部关闭
        document.getElementById('loginModal').addEventListener('click', (e) => {
            if (e.target.id === 'loginModal') {
                closeLoginModal()
            }
        })
    </script>
</body>
</html>
