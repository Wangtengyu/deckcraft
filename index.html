<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒演 - AI一键生成专业PPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0f',
                        surface: '#12121a',
                        card: '#1a1a24',
                        border: '#2a2a3a',
                        accent: '#00d4ff',
                        accent2: '#ff6b9d',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #00d4ff 0%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 212, 255, 0.4);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #00a8cc 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.35);
        }
        
        .input-focus:focus {
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        
        .tab-active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(255, 107, 157, 0.15) 100%);
            border-color: rgba(0, 212, 255, 0.4);
            color: #00d4ff;
        }
        
        .platform-btn.active {
            background: linear-gradient(135deg, #00d4ff 0%, #ff6b9d 100%);
            color: white;
        }
        
        .feature-card {
            background: linear-gradient(145deg, #1a1a24 0%, #12121a 100%);
        }
        
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #12121a;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 3px;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-dark/90 backdrop-blur-md border-b border-white/5">
        <div class="max-w-6xl mx-auto px-4 md:px-6 py-4 flex justify-between items-center">
            <!-- Logo -->
            <a href="index.html" class="flex items-center space-x-2">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-accent to-accent2 flex items-center justify-center">
                    <i class="fas fa-layer-group text-white text-sm"></i>
                </div>
                <div class="flex items-baseline">
                    <span class="text-lg font-bold">FDeck</span>
                    <span class="text-xs text-gray-500 ml-1.5 hidden sm:inline">/ 秒演</span>
                </div>
            </a>
            
            <!-- 导航链接 -->
            <div class="flex items-center space-x-6">
                <a href="index.html" class="text-white text-sm font-medium">首页</a>
                <a href="upload.html" class="text-gray-400 hover:text-white transition text-sm font-medium">模板投喂</a>
                <a href="#templates" class="text-gray-400 hover:text-white transition text-sm font-medium">我的模板</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-32 pb-16 px-4 md:px-6">
        <div class="max-w-4xl mx-auto text-center">
            <!-- 主标题 -->
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-4">
                一键生成<span class="gradient-text">专业演示</span>
            </h1>
            <p class="text-gray-400 text-lg md:text-xl mb-10">
                AI驱动 · 模板丰富 · 质量保证
            </p>
            
            <!-- 搜索/输入区 -->
            <div class="max-w-2xl mx-auto mb-6">
                <div class="flex flex-col md:flex-row gap-3">
                    <div class="flex-1 relative">
                        <i class="fas fa-wand-magic-sparkles absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input 
                            type="text" 
                            id="topicInput"
                            placeholder="输入主题，如：2024年度工作汇报" 
                            class="w-full bg-surface border border-border rounded-xl pl-12 pr-4 py-4 text-white placeholder-gray-500 focus:outline-none input-focus transition"
                            onkeypress="if(event.key==='Enter') generatePPT()"
                        >
                    </div>
                    <button onclick="generatePPT()" class="btn-primary text-white px-8 py-4 rounded-xl font-medium whitespace-nowrap">
                        <i class="fas fa-rocket mr-2"></i>
                        立即生成
                    </button>
                </div>
            </div>
            
            <!-- 特色标签 -->
            <div class="flex flex-wrap justify-center gap-3 text-sm">
                <div class="flex items-center space-x-2 text-gray-400">
                    <i class="fas fa-images text-accent"></i>
                    <span>图片库优先，成本降低90%</span>
                </div>
                <div class="text-gray-600">|</div>
                <div class="flex items-center space-x-2 text-gray-400">
                    <i class="fas fa-microphone-alt text-accent2"></i>
                    <span>配套演讲稿生成</span>
                </div>
                <div class="text-gray-600">|</div>
                <div class="flex items-center space-x-2 text-gray-400">
                    <i class="fas fa-cloud-upload-alt text-accent"></i>
                    <span>模板投喂复用</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 产品特色 -->
    <section class="py-12 px-4 md:px-6">
        <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 特色1：图片库 -->
                <div class="feature-card rounded-2xl border border-border p-6 card-hover">
                    <div class="w-12 h-12 rounded-xl bg-accent/10 flex items-center justify-center mb-4">
                        <i class="fas fa-images text-2xl text-accent"></i>
                    </div>
                    <h3 class="text-lg font-bold mb-2">图片库优先</h3>
                    <p class="text-gray-400 text-sm leading-relaxed">
                        从投喂PPT自动提取图片入库，智能匹配优先使用，成本降低约90%
                    </p>
                </div>
                
                <!-- 特色2：演讲稿 -->
                <div class="feature-card rounded-2xl border border-border p-6 card-hover">
                    <div class="w-12 h-12 rounded-xl bg-accent2/10 flex items-center justify-center mb-4">
                        <i class="fas fa-microphone-alt text-2xl text-accent2"></i>
                    </div>
                    <h3 class="text-lg font-bold mb-2">口播演讲稿</h3>
                    <p class="text-gray-400 text-sm leading-relaxed">
                        PPT生成完成后可一键生成配套演讲稿，口播风格，适合演讲和录制视频
                    </p>
                </div>
                
                <!-- 特色3：模板投喂 -->
                <div class="feature-card rounded-2xl border border-border p-6 card-hover">
                    <div class="w-12 h-12 rounded-xl bg-purple-500/10 flex items-center justify-center mb-4">
                        <i class="fas fa-cloud-upload-alt text-2xl text-purple-400"></i>
                    </div>
                    <h3 class="text-lg font-bold mb-2">模板投喂</h3>
                    <p class="text-gray-400 text-sm leading-relaxed">
                        上传PPT模板，自动解析结构套用，图片入库复用，丰富模板生态
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- 模板展示区 -->
    <section id="templates" class="py-12 px-4 md:px-6">
        <div class="max-w-6xl mx-auto">
            <!-- 标题 -->
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold">已投喂模板</h2>
                <a href="upload.html" class="text-accent text-sm hover:underline">
                    <i class="fas fa-plus mr-1"></i>
                    投喂新模板
                </a>
            </div>
            
            <!-- 分类标签 -->
            <div class="flex items-center space-x-2 mb-6 overflow-x-auto pb-2">
                <button class="tab-active px-4 py-2 rounded-lg border border-border text-sm whitespace-nowrap transition" onclick="filterCategory(this, 'all')">全部</button>
                <button class="px-4 py-2 rounded-lg border border-border text-gray-400 text-sm whitespace-nowrap hover:border-accent/30 transition" onclick="filterCategory(this, 'party')">党政</button>
                <button class="px-4 py-2 rounded-lg border border-border text-gray-400 text-sm whitespace-nowrap hover:border-accent/30 transition" onclick="filterCategory(this, 'business')">商务</button>
                <button class="px-4 py-2 rounded-lg border border-border text-gray-400 text-sm whitespace-nowrap hover:border-accent/30 transition" onclick="filterCategory(this, 'tech')">科技</button>
                <button class="px-4 py-2 rounded-lg border border-border text-gray-400 text-sm whitespace-nowrap hover:border-accent/30 transition" onclick="filterCategory(this, 'education')">教育</button>
            </div>
            
            <!-- 模板卡片网格 -->
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6" id="templateGrid">
                <!-- 党政红金模板 -->
                <div class="feature-card rounded-xl border border-border overflow-hidden card-hover cursor-pointer" onclick="useTemplate('国宝文化展示')">
                    <div class="aspect-video bg-gradient-to-br from-red-900/50 to-amber-900/50 relative overflow-hidden">
                        <div class="absolute inset-0 p-4 flex flex-col justify-between">
                            <div class="flex items-center justify-between">
                                <div class="w-8 h-8 rounded bg-red-500/30 flex items-center justify-center">
                                    <i class="fas fa-flag text-xs text-red-300"></i>
                                </div>
                                <div class="h-1 w-12 bg-amber-400/40 rounded"></div>
                            </div>
                            <div class="space-y-2">
                                <div class="h-2 w-full bg-amber-300/30 rounded"></div>
                                <div class="h-2 w-3/4 bg-amber-300/20 rounded"></div>
                            </div>
                        </div>
                    </div>
                    <div class="p-3">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="font-medium text-sm mb-1">国宝文化展示</h3>
                                <p class="text-xs text-gray-500">党政红金 · 20张图片</p>
                            </div>
                            <button class="px-3 py-1.5 bg-accent/10 text-accent text-xs rounded-lg hover:bg-accent/20 transition">
                                使用
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 占位模板 -->
                <div class="feature-card rounded-xl border border-border border-dashed overflow-hidden flex items-center justify-center aspect-video cursor-pointer hover:border-accent/50 transition" onclick="location.href='upload.html'">
                    <div class="text-center">
                        <i class="fas fa-plus text-3xl text-gray-600 mb-2"></i>
                        <p class="text-sm text-gray-500">投喂新模板</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部 -->
    <footer class="py-8 px-4 md:px-6 border-t border-border">
        <div class="max-w-6xl mx-auto text-center">
            <div class="flex items-center justify-center space-x-2 mb-4">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-accent2 flex items-center justify-center">
                    <i class="fas fa-layer-group text-white text-xs"></i>
                </div>
                <span class="font-bold">FDeck</span>
                <span class="text-gray-500">/</span>
                <span class="text-gray-400">秒演</span>
            </div>
            <p class="text-gray-500 text-sm">
                一键生成专业演示 · AI驱动 · 质量保证
            </p>
        </div>
    </footer>

    <script>
        let currentPlatform = 'ppt'
        
        function selectPlatform(btn, platform) {
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'))
            btn.classList.add('active')
            currentPlatform = platform
        }
        
        function filterCategory(btn, category) {
            document.querySelectorAll('.tab-active').forEach(b => {
                b.classList.remove('tab-active')
                b.classList.add('text-gray-400')
            })
            btn.classList.add('tab-active')
            btn.classList.remove('text-gray-400')
            // TODO: 实现分类筛选逻辑
        }
        
        function generatePPT() {
            const topic = document.getElementById('topicInput').value.trim()
            if (topic) {
                localStorage.setItem('pptTopic', topic)
                localStorage.setItem('pptPlatform', currentPlatform)
            }
            location.href = 'create.html'
        }
        
        function useTemplate(templateName) {
            localStorage.setItem('pptCase', templateName)
            location.href = 'create.html'
        }
        
        // 回车键快捷生成
        document.getElementById('topicInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generatePPT()
            }
        })
    </script>
</body>
</html>
