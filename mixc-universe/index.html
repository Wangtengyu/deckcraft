<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixc Universe - 产品元宇宙导航中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ========== 基础样式重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== 自定义滚动条 ========== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(30, 27, 75, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00f5ff, #bf00ff);
            border-radius: 3px;
        }

        /* ========== 页面基础样式 ========== */
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #e0e0ff;
        }

        /* ========== 科幻网格背景 ========== */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* ========== 粒子画布 ========== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ========== 鼠标跟随光效 ========== */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }

        /* ========== 主容器 ========== */
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ========== 标题区域 ========== */
        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00f5ff 0%, #bf00ff 50%, #ff00aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(0, 245, 255, 0.5);
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 20px rgba(0, 245, 255, 0.5)); }
            50% { filter: brightness(1.2) drop-shadow(0 0 40px rgba(191, 0, 255, 0.7)); }
        }

        .hero-subtitle {
            text-align: center;
            font-size: 1.1rem;
            color: rgba(200, 200, 255, 0.7);
            margin-bottom: 50px;
            letter-spacing: 3px;
        }

        /* ========== 搜索和筛选区域 ========== */
        .search-filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            background: rgba(20, 20, 60, 0.8);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 50px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-box input:focus {
            border-color: #00f5ff;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3), inset 0 0 20px rgba(0, 245, 255, 0.1);
        }

        .search-box input::placeholder {
            color: rgba(200, 200, 255, 0.5);
        }

        .search-box svg {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #00f5ff;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 24px;
            background: rgba(30, 27, 75, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(200, 200, 255, 0.8);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover {
            background: rgba(50, 47, 120, 0.8);
            border-color: rgba(0, 245, 255, 0.5);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.3), rgba(191, 0, 255, 0.3));
            border-color: #00f5ff;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        /* ========== 产品卡片网格 ========== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            perspective: 1000px;
        }

        /* ========== 产品卡片 ========== */
        .product-card {
            position: relative;
            background: rgba(20, 20, 60, 0.6);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, var(--glow-color-1, #00f5ff), transparent, var(--glow-color-2, #bf00ff));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-card:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(-5deg);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 40px var(--glow-color-1, rgba(0, 245, 255, 0.3));
        }

        .product-card.hidden {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
            position: absolute;
        }

        /* 卡片图标区域 */
        .card-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 10px currentColor);
        }

        /* 卡片标题 */
        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        /* 卡片描述 */
        .card-desc {
            font-size: 0.95rem;
            color: rgba(200, 200, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* 卡片底部信息 */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* 状态标签 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--status-color, #00f5ff);
            color: var(--status-color, #00f5ff);
            box-shadow: 0 0 15px var(--status-glow, rgba(0, 245, 255, 0.3));
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 15px var(--status-glow, rgba(0, 245, 255, 0.3)); }
            50% { box-shadow: 0 0 25px var(--status-glow, rgba(0, 245, 255, 0.5)); }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-color, #00f5ff);
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* 创建时间 */
        .create-time {
            font-size: 0.8rem;
            color: rgba(200, 200, 255, 0.5);
        }

        /* 卡片链接指示器 */
        .card-link {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: rgba(0, 245, 255, 0.8);
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .card-link:hover {
            color: #00f5ff;
            gap: 10px;
        }

        /* ========== 状态颜色定义 ========== */
        .status-completed {
            --status-color: #00ff88;
            --status-glow: rgba(0, 255, 136, 0.4);
            --glow-color-1: #00ff88;
            --glow-color-2: #00f5ff;
        }

        .status-progress {
            --status-color: #00f5ff;
            --status-glow: rgba(0, 245, 255, 0.4);
            --glow-color-1: #00f5ff;
            --glow-color-2: #bf00ff;
        }

        .status-planned {
            --status-color: #bf00ff;
            --status-glow: rgba(191, 0, 255, 0.4);
            --glow-color-1: #bf00ff;
            --glow-color-2: #ff00aa;
        }

        .status-paused {
            --status-color: #888;
            --status-glow: rgba(136, 136, 136, 0.3);
            --glow-color-1: #666;
            --glow-color-2: #888;
        }

        .status-released {
            --status-color: #ffd700;
            --status-glow: rgba(255, 215, 0, 0.4);
            --glow-color-1: #ffd700;
            --glow-color-2: #ff8c00;
        }

        /* ========== 详情弹窗 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(20, 20, 60, 0.95), rgba(30, 20, 50, 0.95));
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(0, 245, 255, 0.3);
            box-shadow: 0 0 60px rgba(0, 245, 255, 0.2), 0 0 100px rgba(191, 0, 255, 0.1);
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            font-size: 1.2rem;
        }

        .modal-close:hover {
            background: rgba(255, 0, 100, 0.3);
            border-color: #ff0064;
            transform: rotate(90deg);
        }

        .modal-icon {
            font-size: 5rem;
            text-align: center;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px currentColor);
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00f5ff, #bf00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-status {
            text-align: center;
            margin-bottom: 25px;
        }

        .modal-desc {
            font-size: 1.1rem;
            color: rgba(200, 200, 255, 0.9);
            line-height: 1.8;
            margin-bottom: 30px;
            text-align: center;
        }

        .modal-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .modal-info-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-info-label {
            font-size: 0.75rem;
            color: rgba(200, 200, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .modal-info-value {
            font-size: 0.95rem;
            color: #fff;
        }

        .modal-link {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(191, 0, 255, 0.2));
            border: 1px solid #00f5ff;
            border-radius: 12px;
            color: #00f5ff;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .modal-link:hover {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.4), rgba(191, 0, 255, 0.4));
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
            transform: translateY(-2px);
        }

        /* ========== 统计信息 ========== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00f5ff, #bf00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.85rem;
            color: rgba(200, 200, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ========== 页脚 ========== */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: rgba(200, 200, 255, 0.5);
            font-size: 0.9rem;
        }

        .footer a {
            color: #00f5ff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer a:hover {
            color: #bf00ff;
            text-shadow: 0 0 10px rgba(191, 0, 255, 0.5);
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(200, 200, 255, 0.5);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 768px) {
            .main-container {
                padding: 20px 15px;
            }

            .hero-title {
                font-size: 2rem;
            }

            .hero-subtitle {
                font-size: 0.9rem;
                margin-bottom: 30px;
            }

            .search-filter-bar {
                margin-bottom: 30px;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .product-card {
                padding: 20px;
            }

            .card-icon {
                font-size: 2.5rem;
            }

            .stats-bar {
                gap: 20px;
            }

            .stat-value {
                font-size: 2rem;
            }

            .modal-content {
                padding: 25px;
            }

            .modal-title {
                font-size: 1.4rem;
            }
        }

        /* ========== 加载动画 ========== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 245, 255, 0.2);
            border-top-color: #00f5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 淡入动画 ========== */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
        .product-card:nth-child(4) { animation-delay: 0.4s; }
        .product-card:nth-child(5) { animation-delay: 0.5s; }
        .product-card:nth-child(6) { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
    </div>

    <!-- 粒子画布 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 鼠标跟随光效 -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- 网格背景 -->
    <div class="grid-bg"></div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 标题区域 -->
        <h1 class="hero-title">MIXC UNIVERSE</h1>
        <p class="hero-subtitle">🚀 产品元宇宙 · 导航中心</p>

        <!-- 统计信息 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">总产品</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="progressCount">0</div>
                <div class="stat-label">进行中</div>
            </div>
        </div>

        <!-- 搜索和筛选 -->
        <div class="search-filter-bar">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索产品名称或描述...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="已完成">已完成</button>
                <button class="filter-btn" data-filter="进行中">进行中</button>
                <button class="filter-btn" data-filter="计划中">计划中</button>
                <button class="filter-btn" data-filter="暂停">暂停</button>
            </div>
        </div>

        <!-- 产品网格 -->
        <div class="products-grid" id="productsGrid">
            <!-- 产品卡片将通过JS动态生成 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <p>未找到匹配的产品</p>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" style="position: relative;">
            <button class="modal-close" id="modalClose">✕</button>
            <div class="modal-icon" id="modalIcon"></div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-status" id="modalStatus"></div>
            <p class="modal-desc" id="modalDesc"></p>
            <div class="modal-info-grid">
                <div class="modal-info-item">
                    <div class="modal-info-label">创建时间</div>
                    <div class="modal-info-value" id="modalCreateTime"></div>
                </div>
                <div class="modal-info-item">
                    <div class="modal-info-label">当前状态</div>
                    <div class="modal-info-value" id="modalStatusText"></div>
                </div>
            </div>
            <a class="modal-link" id="modalLink" href="#" target="_blank">
                <span>访问项目 →</span>
            </a>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>Made with 💜 by <a href="https://github.com/Wangtengyu" target="_blank">Mixc</a></p>
        <p style="margin-top: 10px;">© 2024 Mixc Universe · 产品元宇宙导航中心</p>
    </footer>

    <script>
        // ========== 产品数据 ==========
        const productsData = [
            {

        // ========== 粒子系统 ==========
        class ParticleSystem {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.mouse = { x: null, y: null };
                this.colors = ['#00f5ff', '#bf00ff', '#ff00aa', '#00ff88'];
                this.init();
            }

            init() {
                this.resize();
                this.createParticles();
                this.animate();
                window.addEventListener('resize', () => this.resize());
                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                });
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            createParticles() {
                const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
                this.particles = [];
                for (let i = 0; i < particleCount; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 3 + 1,
                        speedX: (Math.random() - 0.5) * 0.5,
                        speedY: (Math.random() - 0.5) * 0.5,
                        color: this.colors[Math.floor(Math.random() * this.colors.length)],
                        alpha: Math.random() * 0.5 + 0.3
                    });
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.particles.forEach((p, i) => {
                    // 更新位置
                    p.x += p.speedX;
                    p.y += p.speedY;

                    // 边界检测
                    if (p.x < 0 || p.x > this.canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > this.canvas.height) p.speedY *= -1;

                    // 鼠标交互
                    if (this.mouse.x !== null && this.mouse.y !== null) {
                        const dx = p.x - this.mouse.x;
                        const dy = p.y - this.mouse.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const force = (150 - dist) / 150;
                            p.x += dx * force * 0.02;
                            p.y += dy * force * 0.02;
                        }
                    }

                    // 绘制粒子
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.alpha;
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;

                    // 连接线
                    for (let j = i + 1; j < this.particles.length; j++) {
                        const p2 = this.particles[j];
                        const dx = p.x - p2.x;
                        const dy = p.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            this.ctx.beginPath();
                            this.ctx.moveTo(p.x, p.y);
                            this.ctx.lineTo(p2.x, p2.y);
                            this.ctx.strokeStyle = p.color;
                            this.ctx.globalAlpha = (1 - dist / 120) * 0.3;
                            this.ctx.lineWidth = 0.5;
                            this.ctx.stroke();
                            this.ctx.globalAlpha = 1;
                        }
                    }
                });

                requestAnimationFrame(() => this.animate());
            }
        }

        // ========== 卡片3D效果 ==========
        class Card3DEffect {
            constructor(card) {
                this.card = card;
                this.card.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                this.card.addEventListener('mouseleave', () => this.handleMouseLeave());
            }

            handleMouseMove(e) {
                const rect = this.card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;

                this.card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
            }

            handleMouseLeave() {
                this.card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0)';
            }
        }

        // ========== 主应用 ==========
        class MixcUniverse {
            constructor() {
                this.products = [...productsData];
                this.currentFilter = 'all';
                this.searchQuery = '';
                this.init();
            }

            init() {
                this.renderProducts();
                this.bindEvents();
                this.initParticles();
                this.updateStats();
                this.hideLoading();
            }

            hideLoading() {
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, 800);
            }

            initParticles() {
                const canvas = document.getElementById('particles-canvas');
                new ParticleSystem(canvas);

                // 鼠标跟随光效
                const cursorGlow = document.getElementById('cursorGlow');
                document.addEventListener('mousemove', (e) => {
                    cursorGlow.style.left = e.clientX + 'px';
                    cursorGlow.style.top = e.clientY + 'px';
                });
            }

            renderProducts() {
                const grid = document.getElementById('productsGrid');
                const emptyState = document.getElementById('emptyState');
                
                // 筛选产品
                let filteredProducts = this.products.filter(product => {
                    const matchFilter = this.currentFilter === 'all' || product.status === this.currentFilter;
                    const matchSearch = this.searchQuery === '' || 
                        product.name.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                        product.description.toLowerCase().includes(this.searchQuery.toLowerCase());
                    return matchFilter && matchSearch;
                });

                // 显示空状态
                if (filteredProducts.length === 0) {
                    grid.style.display = 'none';
                    emptyState.style.display = 'block';
                    return;
                }

                grid.style.display = 'grid';
                emptyState.style.display = 'none';

                // 渲染卡片
                grid.innerHTML = filteredProducts.map((product, index) => `
                    <div class="product-card ${product.statusClass} fade-in" data-id="${product.id}" style="animation-delay: ${index * 0.1}s">
                        <span class="card-icon">${product.icon}</span>
                        <h3 class="card-title">${product.name}</h3>
                        <p class="card-desc">${product.description}</p>
                        <div class="card-footer">
                            <span class="status-badge">
                                <span class="status-dot"></span>
                                ${product.status}
                            </span>
                            <span class="create-time">${product.createTime}</span>
                        </div>
                        ${product.link ? `
                            <div class="card-link">
                                <span>查看详情</span>
                                <span>→</span>
                            </div>
                        ` : ''}
                    </div>
                `).join('');

                // 绑定卡片事件
                this.bindCardEvents();
            }

            bindCardEvents() {
                document.querySelectorAll('.product-card').forEach(card => {
                    new Card3DEffect(card);
                    
                    card.addEventListener('click', () => {
                        const productId = parseInt(card.dataset.id);
                        const product = this.products.find(p => p.id === productId);
                        if (product) {
                            this.showModal(product);
                        }
                    });
                });
            }

            showModal(product) {
                const modal = document.getElementById('modalOverlay');
                document.getElementById('modalIcon').textContent = product.icon;
                document.getElementById('modalTitle').textContent = product.name;
                document.getElementById('modalDesc').textContent = product.description;
                document.getElementById('modalCreateTime').textContent = product.createTime;
                document.getElementById('modalStatusText').textContent = product.status;
                
                const statusBadge = document.getElementById('modalStatus');
                statusBadge.innerHTML = `
                    <span class="status-badge ${product.statusClass}">
                        <span class="status-dot"></span>
                        ${product.status}
                    </span>
                `;

                const linkEl = document.getElementById('modalLink');
                if (product.link) {
                    linkEl.href = product.link;
                    linkEl.style.display = 'block';
                } else {
                    linkEl.style.display = 'none';
                }

                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            hideModal() {
                const modal = document.getElementById('modalOverlay');
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }

            bindEvents() {
                // 筛选按钮
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentFilter = btn.dataset.filter;
                        this.renderProducts();
                    });
                });

                // 搜索输入
                const searchInput = document.getElementById('searchInput');
                let searchTimeout;
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        this.searchQuery = e.target.value.trim();
                        this.renderProducts();
                    }, 300);
                });

                // 弹窗关闭
                document.getElementById('modalClose').addEventListener('click', () => this.hideModal());
                document.getElementById('modalOverlay').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) {
                        this.hideModal();
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.hideModal();
                    }
                });
            }

            updateStats() {
                const total = this.products.length;
                const completed = this.products.filter(p => p.status === '已完成').length;
                const progress = this.products.filter(p => p.status === '进行中').length;

                // 带动画的数字更新
                this.animateNumber('totalCount', total);
                this.animateNumber('completedCount', completed);
                this.animateNumber('progressCount', progress);
            }

            animateNumber(elementId, target) {
                const el = document.getElementById(elementId);
                let current = 0;
                const increment = target / 30;
                const timer = setInterval(() => {
                    current += increment;
                    if (current >= target) {
                        current = target;
                        clearInterval(timer);
                    }
                    el.textContent = Math.floor(current);
                }, 30);
            }
        }

        // ========== 启动应用 ==========
        document.addEventListener('DOMContentLoaded', () => {
            new MixcUniverse();
        });
    </script>
